<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Las Curiosas Citas de Alicia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Quicksand:wght@500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#d4af37;
    --crimson:#8c1c3f;
    --deep-purple:#241b3a;
    --lilac:#b79ce0;
    --cream:#fdf6e3;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:'Quicksand',sans-serif;
    background:
      radial-gradient(circle at 20% 10%, rgba(212,175,55,0.10), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(140,28,63,0.18), transparent 45%),
      linear-gradient(160deg,#1a1230 0%, #241b3a 35%, #34204a 65%, #1a1230 100%);
    color:var(--cream);
    overflow-x:hidden;
    position:relative;
  }

  /* floating sparkle background */
  .sparkle-field{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .sparkle{
    position:absolute;
    border-radius:50%;
    background:radial-gradient(circle, rgba(212,175,55,0.9), rgba(212,175,55,0));
    opacity:0.7;
    animation:drift linear infinite;
  }
  @keyframes drift{
    0%{ transform:translateY(0) translateX(0) scale(1); }
    100%{ transform:translateY(-110vh) translateX(20px) scale(1.4); }
  }

  .wrap{
    position:relative;
    z-index:1;
    max-width:560px;
    margin:0 auto;
    padding:34px 18px 56px;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
  }

  header{
    text-align:center;
    margin-bottom:6px;
  }

  .eyebrow{
    letter-spacing:3px;
    text-transform:uppercase;
    font-size:12px;
    color:var(--lilac);
    font-weight:700;
  }

  h1{
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(28px,7vw,42px);
    margin:6px 0 4px;
    color:var(--gold);
    text-shadow:0 0 18px rgba(212,175,55,0.45), 0 2px 0 rgba(0,0,0,0.4);
    letter-spacing:1px;
  }

  /* --- Alice portrait --- */
  .alice-stage{
    position:relative;
    width:min(78vw,300px);
    aspect-ratio:9/16;
    margin:6px auto 4px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }

  .frame{
    position:absolute;
    inset:0;
    border-radius:18px;
    padding:5px;
    background:linear-gradient(145deg, var(--gold), #fdf3c0 30%, var(--gold) 55%, #8a6d1d 100%);
    box-shadow:
      0 18px 40px rgba(0,0,0,0.55),
      0 0 0 1px rgba(212,175,55,0.4),
      0 0 50px rgba(183,156,224,0.25);
    transition: box-shadow .35s ease;
  }

  .alice-stage:active .frame{
    box-shadow:
      0 10px 24px rgba(0,0,0,0.6),
      0 0 0 1px rgba(212,175,55,0.5),
      0 0 70px rgba(183,156,224,0.5);
  }

  .frame-inner{
    position:relative;
    width:100%;
    height:100%;
    border-radius:14px;
    overflow:hidden;
    background:#100a1c;
  }

  .alice-img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:top center;
    opacity:0;
    transform:scale(1) translateY(0);
    transition:opacity .25s ease;
  }
  .alice-img.show{
    opacity:1;
    z-index:2;
  }

  /* doink effect — a quick glow/shake pulse, no scaling/zoom */
  @keyframes doinkPulse{
    0%   { filter:brightness(1); }
    30%  { filter:brightness(1.25); }
    50%  { filter:brightness(0.92); }
    70%  { filter:brightness(1.15); }
    100% { filter:brightness(1); }
  }
  .anim-shrink, .anim-grow{ animation:doinkPulse 0.9s ease; }

  /* --- speech bubble: overlaid on the image --- */
  .quote-overlay{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    z-index:5;
    padding:22px 18px 20px;
    background:linear-gradient(to top,
      rgba(10,6,20,0.94) 0%,
      rgba(10,6,20,0.88) 45%,
      rgba(10,6,20,0.45) 80%,
      rgba(10,6,20,0) 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .quote-text{
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size:clamp(19px,5.6vw,23px);
    line-height:1.4;
    color:#fffaf0;
    text-shadow:0 2px 6px rgba(0,0,0,0.6);
    transition:opacity .25s ease;
    max-width:94%;
  }

  .quote-source{
    display:block;
    margin-top:10px;
    font-family:'Quicksand',sans-serif;
    font-size:14px;
    font-weight:700;
    color:var(--gold);
    letter-spacing:.5px;
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
  }

  .tag{
    position:relative;
    margin-bottom:10px;
    background:var(--crimson);
    color:var(--cream);
    font-size:10px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:4px 12px;
    border-radius:999px;
    box-shadow:0 4px 10px rgba(0,0,0,0.35);
  }


  /* --- CTA button --- */
  .cta-wrap{
    margin-top:40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .cta-caption{
    font-size:13px;
    color:var(--lilac);
    text-align:center;
    max-width:320px;
    line-height:1.5;
  }

  .easypagex-btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-family:'Cinzel Decorative',serif;
    font-size:17px;
    letter-spacing:1px;
    color:var(--deep-purple);
    text-decoration:none;
    background:linear-gradient(135deg, #ffe9a8 0%, var(--gold) 45%, #b8860b 100%);
    padding:15px 30px;
    border-radius:999px;
    box-shadow:
      0 10px 24px rgba(212,175,55,0.35),
      0 0 0 2px rgba(253,246,227,0.5) inset;
    transition:transform .2s ease, box-shadow .2s ease;
  }

  .easypagex-btn:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:
      0 16px 30px rgba(212,175,55,0.5),
      0 0 0 2px rgba(253,246,227,0.7) inset;
  }

  .easypagex-btn:active{
    transform:translateY(0) scale(0.98);
  }

  .easypagex-btn .crown{
    font-size:18px;
  }

  footer{
    margin-top:44px;
    font-size:11px;
    color:rgba(253,246,227,0.4);
    text-align:center;
  }
</style>
</head>

  let useList1Next = true; // alternate which list supplies the next quote
  let showingImg1 = true;
  let isAnimating = false;

  const img1 = document.getElementById('aliceImg1');
  const img2 = document.getElementById('aliceImg2');
  const stage = document.getElementById('aliceStage');
  const quoteText = document.getElementById('quoteText');
  const quoteSource = document.getElementById('quoteSource');
  const bubbleTag = document.getElementById('bubbleTag');

  function nextQuote(){
    let entry;
    if(useList1Next){
      entry = list1[i1 % list1.length];
      i1++;
    } else {
      entry = list2[i2 % list2.length];
      i2++;
    }
    useList1Next = !useList1Next;
    return entry;
  }

  function updateBubble(entry){
    quoteText.style.opacity = 0;
    quoteSource.style.opacity = 0;
    setTimeout(()=>{
      quoteText.textContent = '"' + entry.text + '"';
      quoteSource.textContent = '— ' + entry.source;
      bubbleTag.textContent = entry.tag;
      quoteText.style.opacity = 1;
      quoteSource.style.opacity = 1;
    }, 180);
  }

  /* ---------- Web Audio "doink" sound ---------- */
  let audioCtx;
  function getCtx(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
    return audioCtx;
  }

  function playDoink(direction){
    // direction: 'shrink' (pitch sweeps DOWN) or 'grow' (pitch sweeps UP)
    const ctx = getCtx();
    const now = ctx.currentTime;
    const dur = 0.55;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';

    const startFreq = direction === 'shrink' ? 760 : 180;
    const endFreq   = direction === 'shrink' ? 140 : 880;

    osc.frequency.setValueAtTime(startFreq, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(endFreq,40), now + dur*0.6);
    osc.frequency.exponentialRampToValueAtTime(Math.max((startFreq+endFreq)/2,40), now + dur);

    // slight vibrato "boing" wobble
    const vibrato = ctx.createOscillator();
    const vibratoGain = ctx.createGain();
    vibrato.frequency.value = 32;
    vibratoGain.gain.value = direction === 'shrink' ? 30 : 50;
    vibrato.connect(vibratoGain);
    vibratoGain.connect(osc.frequency);
    vibrato.start(now);
    vibrato.stop(now + dur);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.5, now + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(now);
    osc.stop(now + dur + 0.05);
  }

  /* ---------- trigger action ---------- */
  function triggerAlice(){
    if(isAnimating) return;
    isAnimating = true;

    const direction = showingImg1 ? 'shrink' : 'grow';
    playDoink(direction);

    stage.classList.remove('anim-shrink','anim-grow');
    // restart animation
    void stage.offsetWidth;
    stage.classList.add(direction === 'shrink' ? 'anim-shrink' : 'anim-grow');

    // swap image roughly at the peak of the animation
    setTimeout(()=>{
      if(showingImg1){
        img1.classList.remove('show');
        img2.classList.add('show');
      } else {
        img2.classList.remove('show');
        img1.classList.add('show');
      }
      showingImg1 = !showingImg1;
    }, 320);

    updateBubble(nextQuote());

    setTimeout(()=>{
      stage.classList.remove('anim-shrink','anim-grow');
      isAnimating = false;
    }, 900);
  }

  stage.addEventListener('click', triggerAlice);
  stage.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      triggerAlice();
    }
  });

  // automatic trigger every 8 seconds
  setInterval(triggerAlice, 8000);

  // initialize bubble with a first quote so it's not empty on load
  updateBubble(nextQuote());
  quoteText.style.opacity = 1;
  quoteSource.style.opacity = 1;

})();
</script>

</body>
</html>
